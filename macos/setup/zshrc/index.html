  <script>
  let titleFontSizes;
  let bodyFontSizes;
  let contentFontSizes;
  let archiveFontSizes;
  let searchTitleFontSizes;
  let searchBodyFontSizes;

  let getFontSize = ({ selector }) => {
    let element = document.querySelector(selector);

    if (element !== null) {
      let oriFontSize = window.getComputedStyle(element).fontSize;
      let incFontSize = parseInt(oriFontSize) * 1.2 + 'px';

      return [
        oriFontSize,
        incFontSize
      ];
    }

    return [0, 0];
  };

  let setFontSize = ({ selector, fontSize }) => document.querySelectorAll(selector).forEach(
    x => x.style['font-size'] = fontSize
  );

  let readFontSize = ({ key, value }) => {
    if (localStorage.getItem(key) !== null) {
      return localStorage.getItem(key);
    }
    else {
      return value;
    }
  };

  let writeFontSize = ({ key, fontSize }) => localStorage.setItem(key, fontSize);

  let loadFontSize = () => {
    // home
    setFontSize({
      selector: '.post-entry a.card-title',
      fontSize: readFontSize({ key: 'title', value: titleFontSizes[0] })
    });

    setFontSize({
      selector: '.post-entry .card-body' ,
      fontSize: readFontSize({ key: 'body', value: bodyFontSizes[0] })
    });

    // post
    setFontSize({
      selector: '#post-content',
      fontSize: readFontSize({ key: 'content', value: contentFontSizes[0] })
    });

    // archive
    setFontSize({
      selector: '.tile-title',
      fontSize: readFontSize({ key: 'archive', value: archiveFontSizes[0] })
    });

    // search
    setFontSize({
      selector: '.search-title',
      fontSize: readFontSize({ key: 'search-title', value: searchTitleFontSizes[0] })
    });

    setFontSize({
      selector: '.search-result-summary',
      fontSize: readFontSize({ key: 'search-body', value: searchBodyFontSizes[0] })
    });
  }

  let toggleFontSize = ({ selector, key, fontSizes }) => {
    let element = document.querySelector(selector);

    if (element !== null) {
      let fontSize = window.getComputedStyle(element).fontSize;

      if (fontSize === fontSizes[0]) {
        setFontSize({ selector, fontSize: fontSizes[1] });
        writeFontSize({ key, fontSize: fontSizes[1]})
      } else {
        setFontSize({ selector, fontSize: fontSizes[0] });
        writeFontSize({ key, fontSize: fontSizes[0] });
      }
    }
  };

  let increaseFontSize = () => {
    // home
    toggleFontSize({
      selector: '.post-entry a.card-title',
      key: 'title',
      fontSizes: titleFontSizes
    });

    toggleFontSize({
      selector: '.post-entry .card-body',
      key: 'body',
      fontSizes: bodyFontSizes
    });

    // post
    toggleFontSize({
      selector: '#post-content',
      key: 'content',
      fontSizes: contentFontSizes
    });

    // archive
    toggleFontSize({
      selector: '.tile-title',
      key: 'archive',
      fontSizes: archiveFontSizes
    });

    // search
    toggleFontSize({
      selector: '.search-title',
      key: 'search-title',
      fontSizes: searchTitleFontSizes
    });

    toggleFontSize({
      selector: '.search-result-summary',
      key: 'search-body',
      fontSizes: searchBodyFontSizes
    });
  };

  window.onload = function () {
    titleFontSizes = getFontSize({ selector: '.post-entry a.card-title' });
    bodyFontSizes = getFontSize({ selector: '.post-entry .card-body' });
    contentFontSizes = getFontSize({ selector: '#post-content' });
    archiveFontSizes = getFontSize({ selector: '.tile-title' });
    searchTitleFontSizes = getFontSize({ selector: '.search-title'});
    searchBodyFontSizes = getFontSize({ selector: '.search-result-summary'});

    loadFontSize();
  };
</script>

            <p>本文記錄我的 <code>.zshrc</code> 基本設定。</p>
<span id="more"></span>

<h2 id="Version"><a href="#Version" class="headerlink" title="Version"></a>Version</h2><p>macOS Sonoma</p>
<h2 id="zshrc"><a href="#zshrc" class="headerlink" title=".zshrc"></a>.zshrc</h2><figure class="highlight shell"><table><tr><td class="code"><pre><span class="line"><span class="meta prompt_"># </span><span class="language-bash">If you come from bash you might have to change your <span class="variable">$PATH</span>.</span></span><br><span class="line">export PATH=$HOME/bin:/usr/local/bin:$PATH</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Path to your oh-my-zsh installation.</span></span><br><span class="line">export ZSH=&quot;$HOME/.oh-my-zsh&quot;</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Launch Z</span></span><br><span class="line">. /opt/homebrew/etc/profile.d/z.sh</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Set name of the theme to load --- <span class="keyword">if</span> <span class="built_in">set</span> to <span class="string">&quot;random&quot;</span>, it will</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">load a random theme each <span class="keyword">time</span> oh-my-zsh is loaded, <span class="keyword">in</span> <span class="built_in">which</span> <span class="keyword">case</span>,</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">to know <span class="built_in">which</span> specific one was loaded, run: <span class="built_in">echo</span> <span class="variable">$RANDOM_THEME</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">See https://github.com/ohmyzsh/ohmyzsh/wiki/Themes</span></span><br><span class="line">ZSH_THEME=&quot;robbyrussell&quot;</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Set list of themes to pick from when loading at random</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Setting this variable when ZSH_THEME=random will cause zsh to load</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">a theme from this variable instead of looking <span class="keyword">in</span> <span class="variable">$ZSH</span>/themes/</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">If <span class="built_in">set</span> to an empty array, this variable will have no effect.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">ZSH_THEME_RANDOM_CANDIDATES=( <span class="string">&quot;robbyrussell&quot;</span> <span class="string">&quot;agnoster&quot;</span> )</span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Uncomment the following line to use case-sensitive completion.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">CASE_SENSITIVE=<span class="string">&quot;true&quot;</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Uncomment the following line to use hyphen-insensitive completion.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Case-sensitive completion must be off. _ and - will be interchangeable.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">HYPHEN_INSENSITIVE=<span class="string">&quot;true&quot;</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Uncomment one of the following lines to change the auto-update behavior</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="built_in">zstyle</span> <span class="string">&#x27;:omz:update&#x27;</span> mode disabled  <span class="comment"># disable automatic updates</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="built_in">zstyle</span> <span class="string">&#x27;:omz:update&#x27;</span> mode auto      <span class="comment"># update automatically without asking</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="built_in">zstyle</span> <span class="string">&#x27;:omz:update&#x27;</span> mode reminder  <span class="comment"># just remind me to update when it&#x27;s time</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Uncomment the following line to change how often to auto-update (<span class="keyword">in</span> days).</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="built_in">zstyle</span> <span class="string">&#x27;:omz:update&#x27;</span> frequency 13</span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Uncomment the following line <span class="keyword">if</span> pasting URLs and other text is messed up.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">DISABLE_MAGIC_FUNCTIONS=<span class="string">&quot;true&quot;</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Uncomment the following line to <span class="built_in">disable</span> colors <span class="keyword">in</span> <span class="built_in">ls</span>.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">DISABLE_LS_COLORS=<span class="string">&quot;true&quot;</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Uncomment the following line to <span class="built_in">disable</span> auto-setting terminal title.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">DISABLE_AUTO_TITLE=<span class="string">&quot;true&quot;</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Uncomment the following line to <span class="built_in">enable</span> <span class="built_in">command</span> auto-correction.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">ENABLE_CORRECTION=<span class="string">&quot;true&quot;</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Uncomment the following line to display red dots whilst waiting <span class="keyword">for</span> completion.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">You can also <span class="built_in">set</span> it to another string to have that shown instead of the default red dots.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">e.g. COMPLETION_WAITING_DOTS=<span class="string">&quot;%F&#123;yellow&#125;waiting...%f&quot;</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Caution: this setting can cause issues with multiline prompts <span class="keyword">in</span> zsh &lt; 5.7.1 (see <span class="comment">#5765)</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">COMPLETION_WAITING_DOTS=<span class="string">&quot;true&quot;</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Uncomment the following line <span class="keyword">if</span> you want to <span class="built_in">disable</span> marking untracked files</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">under VCS as dirty. This makes repository status check <span class="keyword">for</span> large repositories</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">much, much faster.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">DISABLE_UNTRACKED_FILES_DIRTY=<span class="string">&quot;true&quot;</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Uncomment the following line <span class="keyword">if</span> you want to change the <span class="built_in">command</span> execution <span class="keyword">time</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">stamp shown <span class="keyword">in</span> the <span class="built_in">history</span> <span class="built_in">command</span> output.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">You can <span class="built_in">set</span> one of the optional three formats:</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="string">&quot;mm/dd/yyyy&quot;</span>|<span class="string">&quot;dd.mm.yyyy&quot;</span>|<span class="string">&quot;yyyy-mm-dd&quot;</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">or <span class="built_in">set</span> a custom format using the strftime <span class="keyword">function</span> format specifications,</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">see <span class="string">&#x27;man strftime&#x27;</span> <span class="keyword">for</span> details.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">HIST_STAMPS=<span class="string">&quot;mm/dd/yyyy&quot;</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Would you like to use another custom folder than <span class="variable">$ZSH</span>/custom?</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">ZSH_CUSTOM=/path/to/new-custom-folder</span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Which plugins would you like to load?</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Standard plugins can be found <span class="keyword">in</span> <span class="variable">$ZSH</span>/plugins/</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Custom plugins may be added to <span class="variable">$ZSH_CUSTOM</span>/plugins/</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Example format: plugins=(rails git textmate ruby lighthouse)</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Add wisely, as too many plugins slow down shell startup.</span></span><br><span class="line">plugins=(git)</span><br><span class="line"></span><br><span class="line">source $ZSH/oh-my-zsh.sh</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">User configuration</span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="built_in">export</span> MANPATH=<span class="string">&quot;/usr/local/man:<span class="variable">$MANPATH</span>&quot;</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">You may need to manually <span class="built_in">set</span> your language environment</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="built_in">export</span> LANG=en_US.UTF-8</span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Preferred editor <span class="keyword">for</span> <span class="built_in">local</span> and remote sessions</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="keyword">if</span> [[ -n <span class="variable">$SSH_CONNECTION</span> ]]; <span class="keyword">then</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">  <span class="built_in">export</span> EDITOR=<span class="string">&#x27;vim&#x27;</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="keyword">else</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">  <span class="built_in">export</span> EDITOR=<span class="string">&#x27;mvim&#x27;</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="keyword">fi</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Compilation flags</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="built_in">export</span> ARCHFLAGS=<span class="string">&quot;-arch x86_64&quot;</span></span></span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Set personal aliases, overriding those provided by oh-my-zsh libs,</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">plugins, and themes. Aliases can be placed here, though oh-my-zsh</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="built_in">users</span> are encouraged to define aliases within the ZSH_CUSTOM folder.</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">For a full list of active aliases, run `<span class="built_in">alias</span>`.</span></span><br><span class="line"><span class="meta prompt_">#</span><span class="language-bash"></span></span><br><span class="line"><span class="language-bash"><span class="comment"># Example aliases</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="built_in">alias</span> zshconfig=<span class="string">&quot;mate ~/.zshrc&quot;</span></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash"><span class="built_in">alias</span> ohmyzsh=<span class="string">&quot;mate ~/.oh-my-zsh&quot;</span></span></span><br><span class="line"></span><br><span class="line">alias ll=&#x27;ls -al&#x27;</span><br><span class="line">alias y=&#x27;npm run&#x27;</span><br><span class="line">alias ys=&#x27;npm run dev&#x27;</span><br><span class="line">alias yl=&#x27;npm run all&#x27;</span><br><span class="line"></span><br><span class="line">export NVM_DIR=&quot;$HOME/.nvm&quot;</span><br><span class="line">  [ -s &quot;/opt/homebrew/opt/nvm/nvm.sh&quot; ] &amp;&amp; \. &quot;/opt/homebrew/opt/nvm/nvm.sh&quot;  # This loads nvm</span><br><span class="line">  [ -s &quot;/opt/homebrew/opt/nvm/etc/bash_completion.d/nvm&quot; ] &amp;&amp; \. &quot;/opt/homebrew/opt/nvm/etc/bash_completion.d/nvm&quot;  # This loads nvm bash_completion</span><br></pre></td></tr></table></figure>

<p><strong>Line 4</strong></p>
<figure class="highlight shell"><table><tr><td class="code"><pre><span class="line">export ZSH=&quot;$HOME/.oh-my-zsh&quot;</span><br></pre></td></tr></table></figure>

<p>設定 ZSH 環境變數。</p>
<p><strong>Line 7</strong></p>
<figure class="highlight shell"><table><tr><td class="code"><pre><span class="line"><span class="meta prompt_"># </span><span class="language-bash">Launch Z</span></span><br><span class="line">. /opt/homebrew/etc/profile.d/z.sh</span><br></pre></td></tr></table></figure>

<p>啟動 Z。</p>
<p><strong>Line 14</strong></p>
<figure class="highlight shell"><table><tr><td class="code"><pre><span class="line">ZSH_THEME=&quot;robbyrussell&quot;</span><br></pre></td></tr></table></figure>

<p>設定 ZSH 所使用的主題。</p>
<p><strong>Line 106</strong></p>
<figure class="highlight shell"><table><tr><td class="code"><pre><span class="line">alias ll=&#x27;ls -al&#x27;</span><br><span class="line">alias y=&#x27;npm run&#x27;</span><br><span class="line">alias ys=&#x27;npm run dev&#x27;</span><br><span class="line">alias yl=&#x27;npm run all&#x27;</span><br></pre></td></tr></table></figure>

<p>設定自己常用的 alias。</p>
<p><strong>Line 111</strong></p>
<figure class="highlight shell"><table><tr><td class="code"><pre><span class="line">export NVM_DIR=&quot;$HOME/.nvm&quot;</span><br><span class="line">  [ -s &quot;/opt/homebrew/opt/nvm/nvm.sh&quot; ] &amp;&amp; \. &quot;/opt/homebrew/opt/nvm/nvm.sh&quot;  # This loads nvm</span><br><span class="line">  [ -s &quot;/opt/homebrew/opt/nvm/etc/bash_completion.d/nvm&quot; ] &amp;&amp; \. &quot;/opt/homebrew/opt/nvm/etc/bash_completion.d/nvm&quot;  # This loads nvm bash_completion</span><br></pre></td></tr></table></figure>

<p>設定 NVM 環境變數。</p>
